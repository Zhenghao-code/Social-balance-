<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社交天平 (Social Balance) - 极客版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-8 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 纯手工打造的 SVG 图标库（零外部依赖，绝对不报错） ---
        const IconScale = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>;
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline mr-1"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500 mb-4"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconUserMe = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconUserHer = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;

        function App() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [stats, setStats] = useState(null);
            const [sessions, setSessions] = useState([]);
            const [activeView, setActiveView] = useState(null);

            const GAP_SECONDS = 4 * 3600; 

            // 一键重置，清空所有状态
            const handleReset = () => {
                setData(null);
                setStats(null);
                setSessions([]);
                setActiveView(null);
                setError(null);
            };

            const handleDeleteSession = (sessionId) => {
                const newSessions = sessions.filter(s => s.id !== sessionId);
                let totalMy = 0, totalHer = 0;
                newSessions.forEach(s => { if (s.initiator === 'me') totalMy++; else totalHer++; });
                const safeRatio = (a, b) => ((a + b) === 0 ? 0 : (a / (a + b) * 100)).toFixed(1);
                setStats(prev => ({ ...prev, myInitiations: totalMy, herInitiations: totalHer, initiationRatio: safeRatio(totalMy, totalHer) }));
                setSessions(newSessions);
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                setLoading(true); setError(null);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        analyzeData(json);
                    } catch (err) { setError("解析失败：" + err.message); setLoading(false); }
                };
                reader.readAsText(file);
            };

            const analyzeData = (json) => {
                const ownerId = json.session.ownerId;
                const messages = json.messages;
                let parsedSessions = [], currentSession = null, totalMy = 0, totalHer = 0, counter = 0;

                messages.forEach((msg) => {
                    let isMe = msg.hasOwnProperty('isSend') ? (msg.isSend === 1 || msg.isSend === true) : (msg.sender === ownerId);
                    if (!msg.createTime) return;
                    let text = msg.content || msg.msgContent || msg.msg || "";
                    
                    if (!currentSession || (msg.createTime - currentSession.lastMsgTime > GAP_SECONDS)) {
                        if (currentSession) parsedSessions.push(currentSession);
                        if (isMe) totalMy++; else totalHer++;
                        counter++;
                        currentSession = { id: `s_${counter}_${msg.createTime}`, startTime: msg.createTime, lastMsgTime: msg.createTime, initiator: isMe ? 'me' : 'her', msgCount: 1, topicPreview: text || '[图片/语音/系统消息]' };
                    } else {
                        currentSession.lastMsgTime = msg.createTime;
                        currentSession.msgCount++;
                        if (currentSession.topicPreview === '[图片/语音/系统消息]' && text) currentSession.topicPreview = text;
                    }
                });
                if (currentSession) parsedSessions.push(currentSession);
                const ratio = ((totalMy / (totalMy + totalHer)) * 100).toFixed(1);
                setStats({ myInitiations: totalMy, herInitiations: totalHer, initiationRatio: ratio });
                setSessions(parsedSessions.reverse());
                setData(json); setLoading(false);
            };

            const formatDate = (t) => new Date(t * 1000).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            const filteredSessions = sessions.filter(s => s.initiator === activeView);

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-6 space-y-6">
                    
                    {/* 头部区域：充满科技感和极客范儿 */}
                    <div className="bg-gradient-to-br from-slate-900 to-slate-800 rounded-3xl shadow-xl p-8 md:p-12 text-center text-white relative overflow-hidden">
                        <div className="absolute top-0 right-0 -mt-10 -mr-10 opacity-10">
                            <IconScale />
                        </div>
                        
                        {/* 重新上传按钮（仅在有数据时显示） */}
                        {data && (
                            <button 
                                onClick={handleReset} 
                                className="absolute top-6 right-6 flex items-center bg-white/10 hover:bg-white/20 border border-white/20 text-white px-4 py-2 rounded-full backdrop-blur-md transition-all text-sm font-medium z-10"
                                title="清除当前数据并重新上传"
                            >
                                <IconRefresh /> 重新上传
                            </button>
                        )}

                        <div className="flex justify-center items-center space-x-3 mb-4 mt-2">
                            <div className="bg-white/10 p-3 rounded-full backdrop-blur-sm"><IconScale /></div>
                            <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight">社交天平</h1>
                        </div>
                        <p className="text-slate-300 text-lg mb-6 max-w-xl mx-auto font-light">
                            “从来不吵架，可能是因为不在乎；但频繁地找话题，一定是因为还在意。”
                        </p>
                        <div className="inline-flex items-center bg-green-500/20 text-green-300 text-sm px-4 py-1.5 rounded-full font-medium border border-green-500/30">
                            <IconShield /> 100% 纯本地运行，保护您的聊天记录隐私
                        </div>
                    </div>

                    {/* 上传区域：可视化步骤引导 */}
                    {!data && (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 text-center animate-[fadeIn_0.3s_ease-out]">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-slate-500 text-sm">
                                <div className="p-4 bg-slate-50 rounded-2xl"><strong className="text-slate-800 text-lg block mb-1">Step 1</strong>添加 JSON 文件</div>
                                <div className="p-4 bg-slate-50 rounded-2xl"><strong className="text-slate-800 text-lg block mb-1">Step 2</strong>将文件拖入下方虚线框内</div>
                                <div className="p-4 bg-slate-50 rounded-2xl"><strong className="text-slate-800 text-lg block mb-1">Step 3</strong>生成你的专属社交平衡仪表盘</div>
                            </div>

                            <div className="relative border-3 border-dashed border-blue-200 bg-blue-50/50 rounded-3xl p-12 hover:bg-blue-50 hover:border-blue-400 transition-all cursor-pointer group">
                                <input type="file" accept=".json" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                <div className="flex flex-col items-center justify-center transform group-hover:-translate-y-1 transition-transform">
                                    <IconUpload />
                                    <h3 className="text-2xl font-bold text-blue-800 mb-2">点击或拖入 .json 文件</h3>
                                    <p className="text-blue-500/70">支持标准微信聊天记录导出格式</p>
                                </div>
                            </div>
                            {loading && <div className="mt-6 inline-flex items-center px-6 py-3 bg-blue-100 text-blue-700 rounded-full font-semibold animate-pulse">⚙️ 正在解构聊天记录，请稍候...</div>}
                            {error && <div className="mt-6 bg-red-50 text-red-600 p-4 rounded-xl border border-red-200">{error}</div>}
                        </div>
                    )}

                    {/* 数据面板区：带头像和进度条的双卡片 */}
                    {stats && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-[fadeIn_0.4s_ease-out]">
                            {/* 我方卡片 */}
                            <div onClick={() => setActiveView('me')} className={`cursor-pointer rounded-3xl p-8 border-2 transition-all transform hover:-translate-y-1 ${activeView === 'me' ? 'bg-blue-50 border-blue-500 shadow-lg shadow-blue-500/20' : 'bg-white border-transparent shadow hover:border-blue-200'}`}>
                                <div className="flex justify-between items-start mb-6">
                                    <div className="bg-blue-100 p-4 rounded-2xl text-blue-600"><IconUserMe /></div>
                                    <div className="text-right">
                                        <div className="text-sm font-bold text-slate-400 tracking-wider uppercase">我主动发起</div>
                                        <div className="text-4xl font-black text-blue-600 mt-1">{stats.myInitiations}<span className="text-lg text-blue-400 font-medium ml-1">次</span></div>
                                    </div>
                                </div>
                                <div className="w-full bg-slate-100 rounded-full h-3 mb-3 overflow-hidden">
                                    <div className="bg-gradient-to-r from-blue-400 to-blue-600 h-3 rounded-full transition-all duration-1000" style={{ width: `${stats.initiationRatio}%` }}></div>
                                </div>
                                <div className="flex justify-between text-sm">
                                    <span className="text-slate-500">话题贡献占比</span>
                                    <span className="font-bold text-blue-600">{stats.initiationRatio}%</span>
                                </div>
                            </div>

                            {/* 对方卡片 */}
                            <div onClick={() => setActiveView('her')} className={`cursor-pointer rounded-3xl p-8 border-2 transition-all transform hover:-translate-y-1 ${activeView === 'her' ? 'bg-rose-50 border-rose-500 shadow-lg shadow-rose-500/20' : 'bg-white border-transparent shadow hover:border-rose-200'}`}>
                                <div className="flex justify-between items-start mb-6">
                                    <div className="bg-rose-100 p-4 rounded-2xl text-rose-500"><IconUserHer /></div>
                                    <div className="text-right">
                                        <div className="text-sm font-bold text-slate-400 tracking-wider uppercase">对方主动发起</div>
                                        <div className="text-4xl font-black text-rose-500 mt-1">{stats.herInitiations}<span className="text-lg text-rose-300 font-medium ml-1">次</span></div>
                                    </div>
                                </div>
                                <div className="w-full bg-slate-100 rounded-full h-3 mb-3 overflow-hidden">
                                    <div className="bg-gradient-to-r from-rose-400 to-rose-600 h-3 rounded-full transition-all duration-1000" style={{ width: `${100 - stats.initiationRatio}%` }}></div>
                                </div>
                                <div className="flex justify-between text-sm">
                                    <span className="text-slate-500">话题贡献占比</span>
                                    <span className="font-bold text-rose-500">{(100 - stats.initiationRatio).toFixed(1)}%</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 话题明细列表区：质感升级 */}
                    {activeView && (
                        <div className="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden flex flex-col animate-[fadeIn_0.5s_ease-out]" style={{maxHeight: '600px'}}>
                            <div className={`px-6 py-4 border-b flex justify-between items-center bg-slate-50/80 backdrop-blur-md sticky top-0 z-10 ${activeView === 'me' ? 'border-blue-100' : 'border-rose-100'}`}>
                                <h2 className="text-lg font-bold text-slate-800 flex items-center">
                                    <span className={`w-2 h-2 rounded-full mr-2 ${activeView === 'me' ? 'bg-blue-500' : 'bg-rose-500'}`}></span>
                                    {activeView === 'me' ? '由我发起的开场白记录' : '由对方发起的开场白记录'}
                                </h2>
                                <span className="text-xs font-semibold bg-white px-3 py-1 rounded-full border border-slate-200 text-slate-500 shadow-sm">
                                    共 {filteredSessions.length} 条记录
                                </span>
                            </div>
                            
                            <div className="overflow-y-auto p-4 space-y-3 bg-slate-50/30">
                                {filteredSessions.map(s => (
                                    <div key={s.id} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:border-slate-300 transition-all flex justify-between items-start group">
                                        <div className="flex-1 pr-4">
                                            <div className="text-xs font-medium text-slate-400 mb-2 bg-slate-100 inline-block px-2 py-1 rounded-md">
                                                {formatDate(s.startTime)}
                                            </div>
                                            <div className="text-slate-700 leading-relaxed font-medium break-all">
                                                {s.topicPreview}
                                            </div>
                                        </div>
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); handleDeleteSession(s.id); }} 
                                            className="text-slate-300 hover:text-white hover:bg-red-500 p-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all"
                                            title="剔除此干扰记录"
                                        >
                                            <IconTrash />
                                        </button>
                                    </div>
                                ))}
                                {filteredSessions.length === 0 && (
                                    <div className="text-center py-12 text-slate-400">暂无符合条件的记录</div>
                                )}
                            </div>
                        </div>
                    )}

                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
